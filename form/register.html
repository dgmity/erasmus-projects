<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML form</title>
</head>
<body>
    <form action="register.php" method="post">
        <label for="fullname">Full name:</label>
        <input type="text" id="fullname" name="fullname"><br>

        <label for="student_id">Student ID:</label>
        <input type="text" id="student_id" name="student_id"><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email"><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone"><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br>

        <label>Gender:</label><br>
        <label for="gender_m">Male</label>
        <input type="radio" name="gender" id="gender_m" value="male"><br>

        <label for="gender_f">Female</label>
        <input type="radio" name="gender" id="gender_f" value="female"><br>

        <label for="department">Department:</label>
        <select id="department" name="department"></select><br>

        <label for="semester">Semester:</label>
        <select id="semester" name="semester"></select><br>

        <label for="address">Address:</label>
        <textarea id="address" name="address"></textarea><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br>

        <label for="confirm_password">Confirm password:</label>
        <input type="password" name="confirm_password" id="confirm_password"><br>
        <input type="submit"><br>
        <a href="login.html"><button type="button">Login</button></a>
    </form>
</body>
</html>
